<mat-card class="card overflow-hidden shadow-none! bg-secondary mb-0!">
  <mat-card-content>
    <div class="flex flex-row gap-3 mb-2.5">
      <div class="bg-white size-12! rounded-full flex items-center justify-center">
        <i-tabler name="chart-bar" class="flex text-secondary"></i-tabler>
      </div>
      <div>
        <mat-card-title class="text-white">Download count</mat-card-title>
        <mat-card-subtitle class="text-white! opacity-70">March 2026</mat-card-subtitle>
      </div>
    </div>
    <div class="grid grid-cols-12 gap-6 items-end pt-2.5">
      <div class="col-span-5">
        <h2 class="text-3xl font-medium text-white">35,487</h2>
      </div>
      <div class="col-span-7">
        <apx-chart [series]="downloadOptions.series" [chart]="downloadOptions.chart" [grid]="downloadOptions.grid"
          [xaxis]="downloadOptions.xaxis" [yaxis]="downloadOptions.yaxis" [dataLabels]="downloadOptions.dataLabels"
          [plotOptions]="downloadOptions.plotOptions" [tooltip]="downloadOptions.tooltip"
          [colors]="downloadOptions.colors" [stroke]="downloadOptions.stroke" [fill]="downloadOptions.fill">
        </apx-chart>
      </div>
    </div>
  </mat-card-content>
</mat-card>
