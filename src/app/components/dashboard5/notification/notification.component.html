<mat-card class="cardWithShadow mb-0!">
  <mat-card-content class="pb-3!">
    <mat-card-title>Notification</mat-card-title>
  </mat-card-content>
  @for(notification of notifications; track notification.title) {
  <div class="py-4 px-7.5 w-full border-b border-border cursor-pointer">
    <div class="flex items-center w-full gap-4">
      <span class="shrink-0 text-{{ notification.color }} bg-light-{{
          notification.color
        }} rounded-full size-10! flex items-center justify-center">
        <i-tabler class="size-5! flex" name="{{ notification.icon }}"></i-tabler>
      </span>
      <div class="w-full">
        <div class="flex items-center justify-between w-full">
          <h5 class="text-sm font-medium m-0">
            {{ notification.title }}
          </h5>
          <span class="block text-xs">
            {{ notification.time }}</span>
        </div>
        <span class="block text-xs">{{
          notification.subtitle
          }}</span>
      </div>
    </div>
  </div>
  }
</mat-card>
