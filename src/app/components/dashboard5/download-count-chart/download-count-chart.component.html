<mat-card class="cardWithShadow mb-0!">
  <mat-card-content class="pb-1!">
    <div class="flex items-center flex-wrap gap-4 justify-between mb-4">
      <div>
        <mat-card-title>Download Count</mat-card-title>
        <mat-card-subtitle>you can check the count</mat-card-subtitle>
      </div>
      <div class="flex items-center gap-3.5">
        <div class="flex items-center gap-1.5 text-secondary">
          <i-tabler name="circle-filled" class="size-3!"></i-tabler>
          <span class="text-sm">Free</span>
        </div>
        <div class="flex items-center gap-1.5 text-primary">
          <i-tabler name="circle-filled" class="size-3!"></i-tabler>
          <span class="text-sm">Premium</span>
        </div>
      </div>
    </div>
    <apx-chart [series]="downloadcountChart.series" [dataLabels]="downloadcountChart.dataLabels"
      [chart]="downloadcountChart.chart" [legend]="downloadcountChart.legend" [xaxis]="downloadcountChart.xaxis"
      [yaxis]="downloadcountChart.yaxis" [grid]="downloadcountChart.grid" [stroke]="downloadcountChart.stroke"
      [fill]="downloadcountChart.fill" [tooltip]="downloadcountChart.tooltip" [colors]="downloadcountChart.colors"
      [responsive]="downloadcountChart.responsive" [plotOptions]="downloadcountChart.plotOptions"></apx-chart>
  </mat-card-content>
</mat-card>
