<mat-card class="cardWithShadow mb-0!">
  <mat-card-content class="pb-3!">
    <div class="flex items-center flex-wrap gap-4 justify-between mb-1">
      <div>
        <mat-card-title>Products Availability</mat-card-title>
        <mat-card-subtitle>March 2026</mat-card-subtitle>
      </div>
      <mat-form-field class="theme-select" appearance="outline">
        <mat-select value="woo">
          @for(month of months; track month.value) {
          <mat-option [value]="month.value">
            {{ month.viewValue }}
          </mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>
    <div class="relative overflow-auto">
      <table mat-table [dataSource]="dataSource2" class="min-w-full stylish-table">
        <!-- Position Column -->
        <ng-container matColumnDef="product">
          <th mat-header-cell *matHeaderCellDef class="font-medium text-base">
            Product
          </th>
          <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
            <span class="bg-{{ element.color }} rounded-full text-white size-11! flex items-center justify-center">
              <i-tabler name="{{ element.icon }}" class="size-6!"></i-tabler>
            </span>
          </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef class="font-medium text-base">
            Description
          </th>
          <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
            <h6 class="text-base font-medium">
              {{ element.uname }}
            </h6>
            <span class="text-sm">
              {{ element.post }}
            </span>
          </td>
        </ng-container>

        <!-- Weight Column -->
        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef class="font-medium text-base">
            Quantity
          </th>
          <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
            <h6 class="text-base font-medium">
              {{ element.quantity }}
            </h6>
          </td>
        </ng-container>

        <!-- Symbol Column -->
        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef class="font-medium text-base">
            Price
          </th>
          <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
            <h6 class="text-base font-medium">
              {{ element.price }}
            </h6>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns2"></tr>
        <tr class="border-l-4 border-transparent hover:border-primary" mat-row
          *matRowDef="let row; columns: displayedColumns2"></tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
