<mat-card class="cardWithShadow mb-0!">
  <mat-card-content>
    <mat-card-title class="mat-mdc-card-title mb-1!">Experiances</mat-card-title>
    <div class="relative overflow-auto">
      <table mat-table [dataSource]="dataSource2" class="min-w-full experiances-table mt-7.5">
        <ng-container matColumnDef="product">
          <th mat-header-cell *matHeaderCellDef class="font-medium text-base border-b-0 pl-0">
            Product
          </th>
          <td mat-cell *matCellDef="let element" class="pl-0 border-b-0 whitespace-nowrap w-24">
            <img src="{{ element.image }}" alt="img" />
          </td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef class="font-medium text-base border-b-0">
            Description
          </th>
          <td mat-cell *matCellDef="let element" class="border-b-0 whitespace-nowrap w-64">
            <h6 class="text-lg font-medium lh-sm">
              {{ element.uname }}
            </h6>
            <div class="text-sm">
              {{ element.post }}
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef class="font-medium text-base border-b-0">
            Quantity
          </th>
          <td mat-cell *matCellDef="let element" class="border-b-0 whitespace-nowrap">
            <mat-progress-bar class="w-full mat-{{ element.color }}" mode="determinate" color=""
              value="{{ element.value }}"></mat-progress-bar>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns2"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns2"></tr>
      </table>
    </div>
  </mat-card-content>
  <mat-card-content class="border-t border-border pt-7.5">
    <div class="grid grid-cols-12 gap-7.5 items-center">
      <div class="col-span-12 lg:col-span-4 text-center">
        <h6 class="text-3xl leading-normal font-medium">5486</h6>
        <p class="text-base m-0">Projects</p>
      </div>
      <div class="col-span-12 lg:col-span-4 text-center">
        <h6 class="text-3xl leading-normal font-medium">987</h6>
        <p class="text-base m-0">Winning Entries</p>
      </div>
      <div class="col-span-12 lg:col-span-4 text-center">
        <button mat-flat-button class="w-full">
          Hire me
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>
