<mat-card class="cardWithShadow mb-0!">
  <mat-card-content>
    <mat-card-title class="mb-4!">Sales Prediction</mat-card-title>

    <div class="grid grid-cols-12 gap-7.5 items-center">
      <div class="col-span-7">
        <h3 class="text-[40px] text-primary font-normal m-0 leading-normal">$3,528</h3>
        <h6 class="mb-2 text-sm font-normal">10% Increased</h6>
        <span class="block font-medium text-base">(150-165 Sales)</span>
      </div>
      <div class="col-span-5">
        <apx-chart [series]="predictionChart.series" [chart]="predictionChart.chart"
          [plotOptions]="predictionChart.plotOptions" [tooltip]="predictionChart.tooltip" [grid]="predictionChart.grid"
          [colors]="predictionChart.colors" [labels]="predictionChart.labels" [fill]="predictionChart.fill">
        </apx-chart>
      </div>
    </div>
  </mat-card-content>
</mat-card>
